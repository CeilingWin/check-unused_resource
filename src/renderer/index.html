<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; media-src 'self' file:; script-src 'self';">
    <title>Cocos Resource Scanner</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/tree.css">
</head>
<body>
    <!-- Landing / Folder Picker -->
    <div id="folder-picker" class="screen active">
        <div class="picker-content">
            <div class="picker-icon">📂</div>
            <h1>Cocos Resource Scanner</h1>
            <p class="picker-desc">Scan your Cocos2d-JS project to find unused resources</p>
            <button id="btn-select-folder" class="btn-primary">Select Project Folder</button>
            <p class="picker-hint">Folder must contain <code>res/</code> and <code>src/</code> directories</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="screen">
        <!-- Top Bar -->
        <div id="topbar">
            <div class="topbar-left">
                <button id="btn-change-folder" class="btn-icon" title="Change folder">📂</button>
                <span id="project-path" class="project-path"></span>
            </div>
            <div class="topbar-center" id="filter-bar"></div>
            <div class="topbar-right">
                <button id="btn-rescan" class="btn-icon" title="Rescan">🔄</button>
                <button id="btn-export" class="btn-icon" title="Export report">📥</button>
                <button id="btn-settings" class="btn-icon" title="Settings">⚙</button>
            </div>
        </div>

        <!-- Content Area -->
        <div id="content">
            <!-- Left: Tree View -->
            <div id="panel-tree" class="panel">
                <div id="tree-container"></div>
            </div>
            <!-- Resizer -->
            <div class="panel-resizer" data-resize="tree"></div>
            <!-- Right: Preview + References -->
            <div id="panel-detail" class="panel">
                <div id="preview-panel">
                    <div class="panel-header">Preview</div>
                    <div id="preview-content" class="panel-body">
                        <div class="empty-state">Select a file to preview</div>
                    </div>
                </div>
                <div class="panel-resizer-h" data-resize="preview"></div>
                <div id="reference-panel">
                    <div class="panel-header">References</div>
                    <div id="reference-content" class="panel-body">
                        <div class="empty-state">Select a file to see references</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div id="statusbar">
            <span id="status-text">Ready</span>
            <span id="status-stats"></span>
        </div>
    </div>

    <!-- Settings Popup -->
    <div id="settings-popup" class="settings-popup" hidden>
        <div class="settings-header">
            <span>Settings</span>
            <button id="btn-settings-close" class="settings-close" title="Close">✕</button>
        </div>
        <div class="settings-body">
            <div class="settings-row">
                <label class="settings-label" for="font-size-slider">Font size</label>
                <div class="settings-control">
                    <button class="font-size-btn" id="font-size-dec" title="Decrease">−</button>
                    <input type="range" id="font-size-slider" min="11" max="20" step="1" value="13">
                    <button class="font-size-btn" id="font-size-inc" title="Increase">+</button>
                    <span id="font-size-value" class="font-size-value">13px</span>
                </div>
            </div>
            <div class="settings-row">
                <label class="settings-label" for="code-font-size-slider">Code font size</label>
                <div class="settings-control">
                    <button class="font-size-btn" id="code-font-size-dec" title="Decrease">−</button>
                    <input type="range" id="code-font-size-slider" min="9" max="18" step="1" value="11">
                    <button class="font-size-btn" id="code-font-size-inc" title="Increase">+</button>
                    <span id="code-font-size-value" class="font-size-value">11px</span>
                </div>
            </div>
            <div class="settings-footer">
                <button id="btn-font-reset" class="btn-settings-reset">Reset defaults</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
